<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude Commander">
  <title>Claude Commander</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #e0e0e0;
      --text-muted: rgba(224,224,224,0.5);
      --accent: #6366f1;
      --accent-bg: rgba(99,102,241,0.15);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Auth Screen ── */
    #auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .auth-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-card label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      transition: opacity 0.2s;
      width: 100%;
    }

    .btn:active { opacity: 0.8; }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Dashboard ── */
    #dashboard {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    .header {
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: max(0.875rem, env(safe-area-inset-top));
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-title span { color: var(--accent); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--green); }

    .status-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
    }

    /* Session tree */
    .session-tree {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .session-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .session-header {
      align-items: center;
      cursor: pointer;
      display: flex;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      user-select: none;
    }

    .session-header:active { background: rgba(255,255,255,0.03); }

    .session-chevron {
      color: var(--text-muted);
      font-size: 0.65rem;
      transition: transform 0.2s;
    }

    .session-group.expanded .session-chevron { transform: rotate(90deg); }

    .session-name {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .session-count {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
    }

    .window-list {
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
    }

    .session-group.expanded .window-list { display: flex; }

    .window-item {
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      transition: background 0.15s;
    }

    .window-item:last-child { border-bottom: none; }

    .window-item:active { background: var(--accent-bg); }

    .window-item.selected {
      background: var(--accent-bg);
      border-left: 2px solid var(--accent);
      padding-left: calc(2.5rem - 2px);
    }

    .window-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .window-dot.active { background: var(--green); }
    .window-dot.inactive { background: rgba(224,224,224,0.3); }

    .window-name {
      flex: 1;
      font-size: 0.85rem;
    }

    .empty-state {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      gap: 0.5rem;
      justify-content: center;
      padding: 3rem 1rem;
      text-align: center;
    }

    .empty-icon { font-size: 2rem; }

    /* Prompt bar */
    .prompt-bar {
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .prompt-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      padding: 0.65rem 0.875rem;
      resize: none;
      transition: border-color 0.2s;
    }

    .prompt-input:focus { border-color: var(--accent); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1.1rem;
      padding: 0 1rem;
      transition: opacity 0.2s;
    }

    .send-btn:active { opacity: 0.8; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Mic button */
    .mic-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1.1rem;
      padding: 0 0.75rem;
      transition: background 0.2s, color 0.2s;
      position: relative;
    }

    .mic-btn.recording {
      background: rgba(239,68,68,0.15);
      border-color: var(--red);
      color: var(--red);
    }

    @keyframes mic-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .mic-btn.recording::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 7px;
      height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: mic-pulse 1s ease-in-out infinite;
    }

    /* Broadcast toggle */
    .broadcast-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0 0.6rem;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .broadcast-btn.active {
      background: rgba(99,102,241,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .prompt-bar.broadcast-active {
      background: rgba(99,102,241,0.07);
    }

    /* Approval badge */
    .approval-badge {
      background: var(--red);
      border-radius: 20px;
      color: #fff;
      display: none;
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 18px;
      padding: 0.1rem 0.35rem;
      text-align: center;
    }

    .approval-badge.visible { display: inline-block; }

    /* Session detail panel */
    .detail-panel {
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: fixed;
      right: 0;
      top: 0;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      width: min(400px, 100vw);
      z-index: 200;
    }

    .detail-panel.open { transform: translateX(0); }

    .detail-header {
      align-items: center;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      padding-top: max(0.875rem, env(safe-area-inset-top));
      flex-shrink: 0;
    }

    .detail-back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
    }

    .detail-title {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: monospace;
      color: var(--accent);
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .detail-status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .detail-status-card h3 {
      color: var(--text);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .detail-prompt-bar {
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    /* Session header broadcast select state */
    .session-header.session-selected {
      background: rgba(99,102,241,0.1);
      border-left: 2px solid var(--accent);
      padding-left: calc(1rem - 2px);
    }

    /* Metrics button in header */
    .metrics-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      margin-right: 0.4rem;
    }

    .metrics-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    /* Metrics overlay panel */
    #metrics-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(16px);
      z-index: 300;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0) 0 0;
    }

    #metrics-panel.open { display: flex; }

    .metrics-header {
      align-items: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      padding-top: max(0.875rem, env(safe-area-inset-top));
      flex-shrink: 0;
    }

    .metrics-title {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .metrics-close-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
    }

    .metrics-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .metrics-stat-row {
      display: flex;
      gap: 0.75rem;
    }

    .metrics-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      flex: 1;
      padding: 0.875rem 1rem;
      text-align: center;
    }

    .metrics-stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .metrics-stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.3rem;
    }

    .metrics-section-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .metrics-project-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .metrics-project-row {
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr repeat(4, 56px);
      gap: 0;
      padding: 0.65rem 0.875rem;
      font-size: 0.82rem;
    }

    .metrics-project-row:last-child { border-bottom: none; }

    .metrics-project-row.header-row {
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metrics-project-row span { text-align: right; }
    .metrics-project-row span:first-child { text-align: left; font-weight: 600; }

    .metrics-loading {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem;
    }

    /* Toast */
    #toast {
      background: rgba(30,30,40,0.95);
      border: 1px solid var(--border);
      border-radius: 10px;
      bottom: 6rem;
      color: var(--text);
      font-size: 0.85rem;
      left: 50%;
      opacity: 0;
      padding: 0.6rem 1rem;
      pointer-events: none;
      position: fixed;
      transform: translateX(-50%) translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="logo">Claude <span>Commander</span></div>
  <div class="auth-card">
    <label for="token-input">Access Token</label>
    <input type="password" id="token-input" placeholder="Enter your token..." autocomplete="off">
    <button class="btn" id="connect-btn">Connect</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header class="header">
    <div class="header-title">Claude <span>Commander</span></div>
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label" id="status-label">Connecting…</span>
      <span class="approval-badge" id="approval-badge">0</span>
    </div>
    <button class="metrics-btn" id="metrics-btn">Metrics</button>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </header>

  <div class="session-tree" id="session-tree">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div>Connecting to sessions…</div>
    </div>
  </div>

  <div class="prompt-bar" id="prompt-bar">
    <button class="broadcast-btn" id="broadcast-btn" title="Toggle broadcast mode">BC</button>
    <input
      type="text"
      class="prompt-input"
      id="prompt-input"
      placeholder="Select a session..."
      disabled
    >
    <button class="mic-btn" id="mic-btn" title="Voice input">🎙</button>
    <button class="send-btn" id="send-btn" disabled>➤</button>
  </div>
</div>

<!-- Session Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <button class="detail-back-btn" id="detail-back-btn">← Back</button>
    <div class="detail-title" id="detail-title">—</div>
  </div>
  <div class="detail-body">
    <div class="detail-status-card">
      <h3>Status</h3>
      <div id="detail-status-text">No coordination data yet — Phase 3 will populate this.</div>
    </div>
  </div>
  <div class="detail-prompt-bar">
    <input
      type="text"
      class="prompt-input"
      id="detail-prompt-input"
      placeholder="Send to this window…"
    >
    <button class="send-btn" id="detail-send-btn">➤</button>
  </div>
</div>

<!-- Metrics Overlay Panel -->
<div id="metrics-panel">
  <div class="metrics-header">
    <div class="metrics-title">System Metrics</div>
    <button class="metrics-close-btn" id="metrics-close-btn">Close</button>
  </div>
  <div class="metrics-body" id="metrics-body">
    <div class="metrics-loading">Loading metrics…</div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  // ── State ──────────────────────────────────────────────────────────────────
  let token = null;
  let ws = null;
  let reconnectTimer = null;
  let selected = null;          // { session, window } — the targeted window
  let broadcastSession = null;  // string | null — session selected for broadcast
  let broadcastMode = false;    // true when broadcast toggle is active
  let sessions = {};            // { sessionName: { name, windows: [{name, active}] } }
  let approvalCount = 0;        // pending approval count (Phase 3 will populate)
  let detailTarget = null;      // { session, window } shown in detail panel

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const authScreen       = document.getElementById('auth-screen');
  const dashboard        = document.getElementById('dashboard');
  const tokenInput       = document.getElementById('token-input');
  const connectBtn       = document.getElementById('connect-btn');
  const statusDot        = document.getElementById('status-dot');
  const statusLabel      = document.getElementById('status-label');
  const approvalBadge    = document.getElementById('approval-badge');
  const logoutBtn        = document.getElementById('logout-btn');
  const sessionTree      = document.getElementById('session-tree');
  const promptBar        = document.getElementById('prompt-bar');
  const promptInput      = document.getElementById('prompt-input');
  const micBtn           = document.getElementById('mic-btn');
  const broadcastBtn     = document.getElementById('broadcast-btn');
  const sendBtn          = document.getElementById('send-btn');
  const toast            = document.getElementById('toast');
  const detailPanel      = document.getElementById('detail-panel');
  const detailBackBtn    = document.getElementById('detail-back-btn');
  const detailTitle      = document.getElementById('detail-title');
  const detailStatusText = document.getElementById('detail-status-text');
  const detailPromptInput = document.getElementById('detail-prompt-input');
  const detailSendBtn    = document.getElementById('detail-send-btn');

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── Approval badge ─────────────────────────────────────────────────────────
  function updateApprovalBadge(count) {
    approvalCount = count;
    if (count > 0) {
      approvalBadge.textContent = String(count);
      approvalBadge.classList.add('visible');
    } else {
      approvalBadge.classList.remove('visible');
    }
  }

  // ── Auth ───────────────────────────────────────────────────────────────────
  function init() {
    const saved = localStorage.getItem('cc_token');
    if (saved) {
      token = saved;
      showDashboard();
    }
  }

  connectBtn.addEventListener('click', () => {
    const val = tokenInput.value.trim();
    if (!val) return;
    token = val;
    localStorage.setItem('cc_token', token);
    showDashboard();
  });

  tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') connectBtn.click();
  });

  logoutBtn.addEventListener('click', () => {
    disconnect();
    token = null;
    selected = null;
    broadcastSession = null;
    broadcastMode = false;
    sessions = {};
    localStorage.removeItem('cc_token');
    authScreen.style.display = 'flex';
    dashboard.style.display = 'none';
    tokenInput.value = '';
    closeDetailPanel();
  });

  // ── Dashboard ──────────────────────────────────────────────────────────────
  function showDashboard() {
    authScreen.style.display = 'none';
    dashboard.style.display = 'flex';
    connect();
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`;
  }

  function setStatus(connected) {
    statusDot.className = 'status-dot' + (connected ? ' connected' : '');
    statusLabel.textContent = connected ? 'Connected' : 'Disconnected';
  }

  function connect() {
    if (ws && ws.readyState < 2) return;
    clearTimeout(reconnectTimer);
    setStatus(false);
    statusLabel.textContent = 'Connecting…';

    try {
      ws = new WebSocket(wsUrl());
    } catch (err) {
      scheduleReconnect();
      return;
    }

    ws.addEventListener('open', () => {
      setStatus(true);
      fetchSessions();
    });

    ws.addEventListener('message', (event) => {
      let data;
      try { data = JSON.parse(event.data); } catch { return; }
      // Server sends type:'status' with a SessionTree in data
      if (data.type === 'status' && data.data) {
        mergeSessions(data.data.sessions);
        renderTree();
      } else if (data.type === 'sessions') {
        mergeSessions(data.sessions);
        renderTree();
      } else if (data.type === 'approval_count') {
        updateApprovalBadge(data.count || 0);
      } else if (data.type === 'health_update') {
        // Silently update — no UI action needed unless metrics panel is open
        if (metricsOpen) fetchMetrics();
      } else if (data.type === 'session_dead') {
        const d = data.data || {};
        showToast(`Session dead: ${d.session || ''}:${d.window || ''}`);
      }
    });

    ws.addEventListener('close', () => {
      setStatus(false);
      scheduleReconnect();
    });

    ws.addEventListener('error', () => {
      ws.close();
    });
  }

  function disconnect() {
    clearTimeout(reconnectTimer);
    if (ws) { ws.close(); ws = null; }
    setStatus(false);
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 5000);
    statusLabel.textContent = 'Reconnecting…';
  }

  // ── Sessions ───────────────────────────────────────────────────────────────
  async function fetchSessions() {
    try {
      const res = await fetch('/sessions', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      mergeSessions(data.sessions || data);
      renderTree();
    } catch (err) {
      showToast('Failed to load sessions');
    }
  }

  function mergeSessions(incoming) {
    if (!incoming) return;
    const list = Array.isArray(incoming) ? incoming : Object.values(incoming);
    const next = {};
    list.forEach((s) => {
      const name = s.name || s.session || s.id || String(s);
      const windows = (s.windows || []).map((w) => ({
        name: w.name || w.window || w.id || String(w),
        active: w.active !== undefined ? !!w.active : true
      }));
      next[name] = { name, windows };
    });
    sessions = next;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderTree() {
    const keys = Object.keys(sessions);

    // Update header counts
    const totalWindows = keys.reduce((sum, k) => sum + sessions[k].windows.length, 0);
    const countLine = keys.length > 0
      ? `${keys.length} session${keys.length === 1 ? '' : 's'} · ${totalWindows} window${totalWindows === 1 ? '' : 's'}`
      : null;

    if (keys.length === 0) {
      sessionTree.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div>No active sessions found</div>
          ${countLine ? `<div style="font-size:0.75rem;color:var(--text-muted)">${escHtml(countLine)}</div>` : ''}
        </div>`;
      return;
    }

    sessionTree.innerHTML = '';

    // Count summary row
    const summaryEl = document.createElement('div');
    summaryEl.style.cssText = 'font-size:0.75rem;color:var(--text-muted);padding:0.25rem 0.5rem 0';
    summaryEl.textContent = countLine;
    sessionTree.appendChild(summaryEl);

    keys.forEach((sName) => {
      const s = sessions[sName];
      const group = document.createElement('div');
      group.className = 'session-group expanded';
      group.dataset.session = sName;

      const header = document.createElement('div');
      const isBroadcastSelected = broadcastMode && broadcastSession === sName;
      header.className = 'session-header' + (isBroadcastSelected ? ' session-selected' : '');
      header.innerHTML = `
        <span class="session-chevron">▶</span>
        <span class="session-name">${escHtml(sName)}</span>
        <span class="session-count">${s.windows.length}</span>`;

      // Toggle expand/collapse on session header click
      // In broadcast mode: first click selects session, second click collapses
      header.addEventListener('click', (e) => {
        if (broadcastMode) {
          if (broadcastSession === sName) {
            // deselect and collapse
            broadcastSession = null;
            group.classList.toggle('expanded');
          } else {
            broadcastSession = sName;
            updateBroadcastUI();
          }
        } else {
          group.classList.toggle('expanded');
        }
        renderTree();
      });

      const winList = document.createElement('div');
      winList.className = 'window-list';

      s.windows.forEach((w) => {
        const item = document.createElement('div');
        item.className = 'window-item';
        item.dataset.session = sName;
        item.dataset.window = w.name;
        const isSelected = selected && selected.session === sName && selected.window === w.name;
        if (isSelected) item.classList.add('selected');

        item.innerHTML = `
          <span class="window-dot ${w.active ? 'active' : 'inactive'}"></span>
          <span class="window-name">${escHtml(w.name)}</span>`;

        item.addEventListener('click', (e) => {
          e.stopPropagation();
          openDetailPanel(sName, w.name);
          selectWindow(sName, w.name);
        });
        winList.appendChild(item);
      });

      group.appendChild(header);
      group.appendChild(winList);
      sessionTree.appendChild(group);
    });
  }

  function selectWindow(sessionName, windowName) {
    selected = { session: sessionName, window: windowName };

    document.querySelectorAll('.window-item').forEach((el) => {
      el.classList.toggle(
        'selected',
        el.dataset.session === sessionName && el.dataset.window === windowName
      );
    });

    promptInput.placeholder = `Send to ${sessionName}:${windowName}…`;
    promptInput.disabled = false;
    promptInput.focus();
    sendBtn.disabled = false;
  }

  // ── Detail panel ───────────────────────────────────────────────────────────
  function openDetailPanel(sessionName, windowName) {
    detailTarget = { session: sessionName, window: windowName };
    detailTitle.textContent = `${sessionName}:${windowName}`;
    detailStatusText.textContent = 'No coordination data yet — Phase 3 will populate this.';
    detailPromptInput.placeholder = `Send to ${sessionName}:${windowName}…`;
    detailPanel.classList.add('open');
  }

  function closeDetailPanel() {
    detailPanel.classList.remove('open');
    detailTarget = null;
  }

  detailBackBtn.addEventListener('click', closeDetailPanel);

  detailSendBtn.addEventListener('click', sendDetailPrompt);
  detailPromptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendDetailPrompt();
    }
  });

  async function sendDetailPrompt() {
    const prompt = detailPromptInput.value.trim();
    if (!prompt || !detailTarget) return;

    detailSendBtn.disabled = true;
    detailPromptInput.disabled = true;

    try {
      const res = await fetch(
        `/send/${encodeURIComponent(detailTarget.session)}/${encodeURIComponent(detailTarget.window)}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ prompt })
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      detailPromptInput.value = '';
      showToast('Sent!');
    } catch (err) {
      showToast('Send failed: ' + err.message);
    } finally {
      detailSendBtn.disabled = false;
      detailPromptInput.disabled = false;
      detailPromptInput.focus();
    }
  }

  // ── Broadcast ──────────────────────────────────────────────────────────────
  broadcastBtn.addEventListener('click', () => {
    broadcastMode = !broadcastMode;
    if (!broadcastMode) broadcastSession = null;
    updateBroadcastUI();
    renderTree();
  });

  function updateBroadcastUI() {
    broadcastBtn.classList.toggle('active', broadcastMode);
    promptBar.classList.toggle('broadcast-active', broadcastMode);
    if (broadcastMode) {
      const target = broadcastSession ? `BC → ${broadcastSession}` : 'BC → all';
      promptInput.placeholder = target;
      promptInput.disabled = false;
      sendBtn.disabled = false;
    } else {
      if (!selected) {
        promptInput.placeholder = 'Select a session…';
        promptInput.disabled = true;
        sendBtn.disabled = true;
      }
    }
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendPrompt);
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  async function sendPrompt() {
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    if (broadcastMode) {
      await sendBroadcast(prompt);
      return;
    }

    if (!selected) return;

    sendBtn.disabled = true;
    promptInput.disabled = true;

    try {
      const res = await fetch(
        `/send/${encodeURIComponent(selected.session)}/${encodeURIComponent(selected.window)}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ prompt })
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      promptInput.value = '';
      showToast('Sent!');
    } catch (err) {
      showToast('Send failed: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      promptInput.disabled = false;
      promptInput.focus();
    }
  }

  async function sendBroadcast(prompt) {
    sendBtn.disabled = true;
    promptInput.disabled = true;

    try {
      const url = broadcastSession
        ? `/broadcast/${encodeURIComponent(broadcastSession)}`
        : '/broadcast/all';

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ prompt })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      promptInput.value = '';
      const dest = broadcastSession ? broadcastSession : 'all sessions';
      showToast(`Broadcast to ${dest} (${(data.sentTo || []).length} windows)`);
    } catch (err) {
      showToast('Broadcast failed: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      promptInput.disabled = false;
      promptInput.focus();
    }
  }

  // ── Voice input ────────────────────────────────────────────────────────────
  (function initVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      micBtn.title = 'Voice input not supported in this browser';
      micBtn.style.opacity = '0.3';
      micBtn.disabled = true;
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    let isRecording = false;

    micBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
      } else {
        try {
          recognition.start();
        } catch (e) {
          showToast('Voice input error: ' + e.message);
        }
      }
    });

    recognition.addEventListener('start', () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Listening… tap to stop';
    });

    recognition.addEventListener('result', (event) => {
      const transcript = Array.from(event.results)
        .map((r) => r[0].transcript)
        .join(' ')
        .trim();
      if (transcript) {
        const activeInput = detailPanel.classList.contains('open')
          ? detailPromptInput
          : promptInput;
        activeInput.value = (activeInput.value ? activeInput.value + ' ' : '') + transcript;
        activeInput.focus();
      }
    });

    recognition.addEventListener('end', () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = 'Voice input';
    });

    recognition.addEventListener('error', (event) => {
      isRecording = false;
      micBtn.classList.remove('recording');
      if (event.error !== 'aborted') {
        showToast('Voice error: ' + event.error);
      }
    });
  })();

  // ── Utility ────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Metrics panel ──────────────────────────────────────────────────────────
  const metricsBtn      = document.getElementById('metrics-btn');
  const metricsPanel    = document.getElementById('metrics-panel');
  const metricsBody     = document.getElementById('metrics-body');
  const metricsCloseBtn = document.getElementById('metrics-close-btn');

  let metricsOpen = false;

  metricsBtn.addEventListener('click', () => {
    metricsOpen = !metricsOpen;
    metricsPanel.classList.toggle('open', metricsOpen);
    metricsBtn.classList.toggle('active', metricsOpen);
    if (metricsOpen) fetchMetrics();
  });

  metricsCloseBtn.addEventListener('click', () => {
    metricsOpen = false;
    metricsPanel.classList.remove('open');
    metricsBtn.classList.remove('active');
  });

  async function fetchMetrics() {
    metricsBody.innerHTML = '<div class="metrics-loading">Loading metrics…</div>';
    try {
      const res = await fetch('/metrics', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const m = await res.json();
      renderMetrics(m);
    } catch (err) {
      metricsBody.innerHTML = `<div class="metrics-loading">Failed to load metrics: ${escHtml(err.message)}</div>`;
    }
  }

  function renderMetrics(m) {
    const upMins = Math.floor(m.uptime / 60);
    const upSecs = m.uptime % 60;
    const uptimeStr = `${upMins}m ${upSecs}s`;

    let html = `
      <div class="metrics-stat-row">
        <div class="metrics-stat">
          <div class="metrics-stat-value">${m.totalSessions ?? 0}</div>
          <div class="metrics-stat-label">Sessions</div>
        </div>
        <div class="metrics-stat">
          <div class="metrics-stat-value">${m.totalWindows ?? 0}</div>
          <div class="metrics-stat-label">Windows</div>
        </div>
        <div class="metrics-stat">
          <div class="metrics-stat-value">${uptimeStr}</div>
          <div class="metrics-stat-label">Uptime</div>
        </div>
      </div>`;

    const projects = m.projects || [];
    if (projects.length > 0) {
      html += `<div class="metrics-section-title">Projects</div>
        <div class="metrics-project-table">
          <div class="metrics-project-row header-row">
            <span>Project</span>
            <span>Run</span>
            <span>Done</span>
            <span>Blk</span>
            <span>Wait</span>
          </div>`;
      for (const p of projects) {
        html += `
          <div class="metrics-project-row">
            <span>${escHtml(p.project)}</span>
            <span>${p.agentsRunning ?? 0}</span>
            <span>${p.agentsComplete ?? 0}</span>
            <span>${p.agentsBlocked ?? 0}</span>
            <span>${p.agentsWaiting ?? 0}</span>
          </div>`;
      }
      html += '</div>';
    } else {
      html += '<div class="metrics-loading">No projects configured.</div>';
    }

    metricsBody.innerHTML = html;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  init();
})();
</script>
</body>
</html>
